<!DOCTYPE html>
<html>

<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<!-- bootstrap -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
    rel="stylesheet">
<!-- google fonts -->
<link href="search.css" rel="stylesheet" type="text/css" />
<!-- css page -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Search</title>
</head>

<body>

    <div class="my-container text-center">
    <div class="title">
        <h1> Search</h1> 
    </div>
    <!-- Navigation bar -->
    <div class="navBar">
        <a href="index.html" class="nav-link">Home</a>
        <a href="browse.html" class="nav-link">Browse Spots</a>
        <a href="search.html" class="nav-link">Search</a>
        <a href="about.html" class="nav-link">About</a>
    </div>
    </div>
<div class = "check">
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="option1">
            <label class="form-check-label" for="inlineCheckbox1">Walking Distance</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="option2">
            <label class="form-check-label" for="inlineCheckbox2">Driving Distance</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="option3">
            <label class="form-check-label" for="inlineCheckbox3">On Campus</label>
        </div>

        <div style="display: inline-flex; gap: 1rem;">
            <div>
            <label for="focus-level">Focus Level:</label>
            <select class="form-control" id="focus-level">
                <option value="1">Social/Casual Work</option>
                <option value="2">Quiet Work With Friends</option>
                <option value="3">Quiet Work Alone</option>
                <option value="4">Silent Work Alone</option>
            </select>
            </div>
            <div>
            <label for="in-out">Indoor/Outdoor:</label>
            <select class="form-control" id="in-out">
                <option value="in">Indoor</option>
                <option value="out">Outdoor</option>
                <option value="indoor/outdoor">Indoor/Outdoor</option>
            </select>
            </div>
        </div>
            <div class ="goBtn text-center">
            <div class="col-sm-2">
                <button class="btn btn-primary" id="go">Go</button>
            </div>
            </div> 
        </div>
        <table id="csvTable">
            <thead></thead>
            <tbody></tbody>
        </table>
        <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
        <script>
            Papa.parse("study_spots.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    const table = document.getElementById("csvTable");
                    const thead = table.querySelector("thead");
                    const tbody = table.querySelector("tbody");
            
                    // Create headers dynamically
                    const headerRow = document.createElement("tr");
                    Object.keys(results.data[0]).forEach(key => {
                        const th = document.createElement("th");
                        th.textContent = key;
                        headerRow.appendChild(th);
                    });
                    thead.appendChild(headerRow);
            
                    // Create rows
                    results.data.forEach(row => {
                        const tr = document.createElement("tr");
            
                        Object.keys(row).forEach(key => {
            const td = document.createElement("td");
            let value = row[key];
        
            if (key === "On Campus") {
                td.textContent = value.trim().toLowerCase() === "true" ? "On" : "Off";
            } else {
                td.textContent = value;
            }
        
            tr.appendChild(td);
        });
            
                        tbody.appendChild(tr);
                    });
                }
            });
            </script>

<script src="search.js"></script>
</body>
</html>
